<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JAVIER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0d0f14;
  color: #d4daf0;
  margin: 0;
  padding: 20px;
}

h2 {
  color: #f0b429;
}

/* search + controls */
.controls {
  margin: 10px 0;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.controls input,
.controls select,
.controls button {
  padding: 8px;
  border: none;
  border-radius: 4px;
}

/* scroll container */
.table-container {
  max-height: 500px;
  overflow: auto;
  border: 1px solid #2a2f45;
  margin-top: 10px;
}

/* table */
table {
  width: 100%;
  border-collapse: collapse;
}

/* sticky header */
thead th {
  position: sticky;
  top: 0;
  background: #1c1f2b;
  color: #f0b429;
  z-index: 2;
  padding: 10px;
  border: 1px solid #2a2f45;
}

td {
  padding: 8px;
  border: 1px solid #2a2f45;
}

tr:hover {
  background: #1c1f2b;
}

/* Visualization Section */
.viz-section {
  margin-top: 30px;
  border-top: 2px solid #facc15;
  padding-top: 20px;
}

.viz-section h2 {
  color: #facc15;
  margin-bottom: 20px;
}

.viz-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.viz-card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 18px;
  padding: 20px;
  min-height: 350px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.viz-card h3 {
  margin-bottom: 20px;
  font-size: 18px;
  color: white;
  font-weight: bold;
}

.viz-card canvas {
  width: 100% !important;
  height: 260px !important;
}

/* Tab navigation */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab-btn {
  padding: 10px 20px;
  background: #1c1f2b;
  border: 1px solid #2a2f45;
  color: #d4daf0;
  border-radius: 4px;
  cursor: pointer;
}

.tab-btn.active {
  background: #f0b429;
  color: #0d0f14;
  font-weight: bold;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}
</style>

</head>

<body>

<h2>Dataset Dashboard</h2>

<!-- Tab Navigation -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('table')">Data Table</button>
  <button class="tab-btn" onclick="showTab('visualization')">Visualizations</button>
</div>

<!-- Table View -->
<div id="tableView" class="tab-content active">
<p id="rowCount">Loading...</p>

<!-- CONTROLS -->
<div class="controls">
  <input id="searchInput" type="text" placeholder="Search Job Title or Author">

  <select id="sortSelect">
    <option value="">Sort by...</option>
    <option value="job_title">Job Title</option>
    <option value="experience_years">Experience</option>
    <option value="skills_count">Skills</option>
    <option value="salary">Salary</option>
  </select>

  <!-- New: sort order selector -->
  <select id="sortOrder" title="Sort order">
    <option value="desc">High → Low</option>
    <option value="asc">Low → High</option>
  </select>

  <button onclick="applyFilterSort()">Apply</button>
  <button onclick="resetTable()">Reset</button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Job Title</th>
      <th>Experience</th>
      <th>Education</th>
      <th>Skills</th>
      <th>Industry</th>
      <th>Company Size</th>
      <th>Location</th>
      <th>Remote</th>
      <th>Salary</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>
</div>

<!-- Visualization View -->
<div id="vizView" class="tab-content">
<div class="viz-grid">
  <div class="viz-card">
    <h3>JOB TITLE VS SALARY</h3>
    <canvas id="barChart"></canvas>
  </div>

  <div class="viz-card">
    <h3>EXPERIENCE YEARS VS SALARY</h3>
    <canvas id="scatterChart"></canvas>
  </div>

  <div class="viz-card">
    <h3>SALARY DISTRIBUTION</h3>
    <canvas id="histogramChart"></canvas>
  </div>

  <div class="viz-card">
    <h3>INDUSTRY DISTRIBUTION</h3>
    <canvas id="pieChart"></canvas>
  </div>
</div>
</div>

<script>
"use strict";

/* =========================
   GLOBAL STATE
========================= */
window.DS = [];
let ORIGINAL_DATA = [];
let chartInstances = {};

/* =========================
   TAB NAVIGATION
========================= */
function showTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  
  if (tabName === 'table') {
    document.getElementById('tableView').classList.add('active');
    document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
  } else {
    document.getElementById('vizView').classList.add('active');
    document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
    // Initialize charts when switching to visualization tab
    if (window.DS.length > 0) {
      initCharts();
    }
  }
}

/* =========================
   LOAD CSV
========================= */
async function loadCSV() {
  try {
    const res = await fetch("./dataset.csv");
    const text = await res.text();

    window.DS = parseCSV(text).slice(0, 5000);
    ORIGINAL_DATA = [...window.DS];

    renderTable(window.DS);
    updateCount(window.DS.length);

  } catch (err) {
    console.error(err);
    document.getElementById("rowCount").textContent =
      "❌ CSV failed. Check dataset.csv location or use Live Server.";
  }
}

/* =========================
   CSV PARSER
========================= */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(",").map(h => h.trim());

  const data = [];

  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(",");

    let obj = {};

    for (let j = 0; j < headers.length; j++) {
      let val = values[j];

      if (val !== "" && !isNaN(val)) val = Number(val);

      obj[headers[j]] = val;
    }

    data.push(obj);
  }

  return data;
}

/* =========================
   RENDER TABLE
========================= */
function renderTable(data) {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  if (!data.length) {
    body.innerHTML = `
      <tr>
        <td colspan="10" style="text-align:center;padding:20px;">
          No results found
        </td>
      </tr>`;
    return;
  }

  const fragment = document.createDocumentFragment();

  data.forEach((row, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${row.job_title || ""}</td>
      <td>${row.experience_years || ""}</td>
      <td>${row.education_level || ""}</td>
      <td>${row.skills_count || ""}</td>
      <td>${row.industry || ""}</td>
      <td>${row.company_size || ""}</td>
      <td>${row.location || ""}</td>
      <td>${row.remote_work || ""}</td>
      <td>${row.salary || ""}</td>
    `;

    fragment.appendChild(tr);
  });

  body.appendChild(fragment);
}

/* =========================
   SEARCH + SORT
========================= */
function applyFilterSort() {
  let data = [...ORIGINAL_DATA];

  const search = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const sort = document.getElementById("sortSelect").value;
  const order = document.getElementById("sortOrder").value || 'desc';

  /* FILTER */
  if (search) {
    data = data.filter(row =>
      (row.job_title && row.job_title.toLowerCase().includes(search)) ||
      (row.author && row.author.toLowerCase().includes(search))
    );
  }

  /* SORT */
  if (sort) {
    data.sort((a, b) => {
      const av = a[sort];
      const bv = b[sort];

      // numeric comparison when possible
      if ((typeof av === 'number' || !isNaN(av)) && (typeof bv === 'number' || !isNaN(bv))) {
        const na = Number(av) || 0;
        const nb = Number(bv) || 0;
        return order === 'desc' ? (nb - na) : (na - nb);
      }

      // string comparison fallback
      const sa = (av || "") + "";
      const sb = (bv || "") + "";
      return order === 'desc' ? sb.localeCompare(sa) : sa.localeCompare(sb);
    });
  }

  window.DS = data;

  renderTable(data);
  updateCount(data.length);
}

/* =========================
   RESET
========================= */
function resetTable() {
  document.getElementById("searchInput").value = "";
  document.getElementById("sortSelect").value = "";
  // reset sort order to default (High → Low)
  const so = document.getElementById("sortOrder");
  if (so) so.value = 'desc';

  window.DS = [...ORIGINAL_DATA];

  renderTable(window.DS);
  updateCount(window.DS.length);
}

/* =========================
   COUNT
========================= */


/* =========================
   CHART HELPERS
========================= */
function destroyChart(canvasId) {
  if (chartInstances[canvasId]) {
    chartInstances[canvasId].destroy();
  }
}

// 1. BAR CHART — Job Title vs Salary
function drawBarChart(canvasId, data) {
  destroyChart(canvasId);

  const ctx = document.getElementById(canvasId);

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(row => row.job_title),
      datasets: [{
        label: 'Salary',
        data: data.map(row => row.salary),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      plugins: {
        title: {
          display: true,
          text: 'Job Title vs Salary'
        }
      },
      scales: {
        x: {
          title: {
            display: true,
            text: 'Job Title'
          }
        },
        y: {
          beginAtZero: true,
          title: {
            display: true,
            text: 'Salary'
          }
        }
      }
    }
  });
}

// 2. SCATTER PLOT — Experience vs Salary
function drawScatterPlot(canvasId, data) {
  destroyChart(canvasId);

  const ctx = document.getElementById(canvasId);

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'Experience vs Salary',
        data: data.map(row => ({
          x: row.experience_years,
          y: row.salary
        })),
        pointRadius: 7
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: {
          title: {
            display: true,
            text: 'Experience Years'
          }
        },
        y: {
          title: {
            display: true,
            text: 'Salary'
          }
        }
      }
    }
  });
}

// 3. HISTOGRAM — Salary Distribution
function drawHistogram(canvasId, data) {
  destroyChart(canvasId);

  const ctx = document.getElementById(canvasId);

  const bins = {
    "50k-80k": 0,
    "80k-110k": 0,
    "110k-140k": 0,
    "140k-170k": 0,
    "170k-200k": 0,
    "200k+": 0
  };

  data.forEach(row => {
    const salary = row.salary;

    if (salary < 80000) bins["50k-80k"]++;
    else if (salary < 110000) bins["80k-110k"]++;
    else if (salary < 140000) bins["110k-140k"]++;
    else if (salary < 170000) bins["140k-170k"]++;
    else if (salary < 200000) bins["170k-200k"]++;
    else bins["200k+"]++;
  });

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(bins),
      datasets: [{
        label: 'Frequency',
        data: Object.values(bins),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true
    }
  });
}

// 4. PIE CHART — Industry Distribution
function drawPieChart(canvasId, data) {
  destroyChart(canvasId);

  const ctx = document.getElementById(canvasId);

  const industries = {};
  data.forEach(row => {
    industries[row.industry] = (industries[row.industry] || 0) + 1;
  });

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: Object.keys(industries),
      datasets: [{
        data: Object.values(industries),
        backgroundColor: [
          '#36A2EB',
          '#FF6384',
          '#FF9F40',
          '#FFCD56',
          '#4BC0C0',
          '#9966FF',
          '#C9C9C9',
          '#FF6384'
        ]
      }]
    },
    options: {
      responsive: true
    }
  });
}

// Initialize all charts
function initCharts() {
  if (window.DS.length > 0) {
    drawBarChart('barChart', window.DS);
    drawScatterPlot('scatterChart', window.DS);
    drawHistogram('histogramChart', window.DS);
    drawPieChart('pieChart', window.DS);
  }
}

/* =========================
   INIT
========================= */
loadCSV();
</script>

</body>
</html>
