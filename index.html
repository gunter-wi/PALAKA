<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Job Salary Dataset Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body { font-family: Arial; background:#0d1117; color:#c9d1d9; margin:0; }
header { padding:20px; background:#161b22; border-bottom:1px solid #30363d; }
h1 { margin:0; color:#58a6ff; }

main { padding:20px; }

.panel { background:#161b22; padding:15px; border:1px solid #30363d; border-radius:8px; }

table { width:100%; border-collapse:collapse; margin-top:10px; font-size:14px; }
th, td { border-bottom:1px solid #30363d; padding:8px; text-align:left; }
th { background:#21262d; color:#58a6ff; position:sticky; top:0; }

input, select, button {
  background:#21262d; color:#c9d1d9; border:1px solid #30363d;
  padding:6px 10px; margin:5px; border-radius:6px;
}
button { cursor:pointer; }
button:hover { border-color:#58a6ff; }
</style>
</head>

<body>

<header>
  <h1>Job Salary Dataset Dashboard</h1>
</header>

<main>

<div class="panel">

  <div>
    <input id="filterInput" placeholder="Filter job title..." />
    
    <select id="sortSelect">
      <option value="">Sort by...</option>
      <option value="experience_years">Experience</option>
      <option value="skills_count">Skills</option>
      <option value="salary">Salary</option>
    </select>

    <button onclick="applyFilterSort()">Apply</button>
    <button onclick="resetTable()">Reset</button>
  </div>

  <div id="rowCount">Rows: 0</div>

  <table>
    <thead>
      <tr>
        <th>Job Title</th>
        <th>Experience</th>
        <th>Education</th>
        <th>Skills</th>
        <th>Industry</th>
        <th>Company Size</th>
        <th>Location</th>
        <th>Remote</th>
        <th>Certifications</th>
        <th>Salary</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="10">Loading...</td></tr>
    </tbody>
  </table>

</div>

</main>

<script>

/* =========================
   STUDENT 1 - FULL WORKING
========================= */

let dataset = [];

async function loadDataset() {
  const res = await fetch("job_salary_prediction_dataset.csv");
  const text = await res.text();

  const rows = text.trim().split("\n");
  const headers = rows[0].split(",");

  dataset = rows.slice(1).map(row => {
    const cols = row.split(",");
    return {
      job_title: cols[0],
      experience_years: +cols[1],
      education_level: cols[2],
      skills_count: +cols[3],
      industry: cols[4],
      company_size: cols[5],
      location: cols[6],
      remote_work: cols[7],
      certifications: cols[8],
      salary: +cols[9]
    };
  });

  renderTable(dataset);
  document.getElementById("rowCount").innerText = "Rows: " + dataset.length;
}

function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  if (data.length === 0) {
    tbody.innerHTML = "<tr><td colspan='10'>No results</td></tr>";
    return;
  }

  data.forEach(row => {
    tbody.innerHTML += `
      <tr>
        <td>${row.job_title}</td>
        <td>${row.experience_years}</td>
        <td>${row.education_level}</td>
        <td>${row.skills_count}</td>
        <td>${row.industry}</td>
        <td>${row.company_size}</td>
        <td>${row.location}</td>
        <td>${row.remote_work}</td>
        <td>${row.certifications}</td>
        <td>${row.salary}</td>
      </tr>
    `;
  });
}

function applyFilterSort() {
  let filtered = [...dataset];

  const keyword = document.getElementById("filterInput").value.toLowerCase();
  const sortBy = document.getElementById("sortSelect").value;

  if (keyword) {
    filtered = filtered.filter(d =>
      d.job_title.toLowerCase().includes(keyword)
    );
  }

  if (sortBy) {
    filtered.sort((a,b) => {
      if (typeof a[sortBy] === "number") {
        return b[sortBy] - a[sortBy];
      }
      return ("" + a[sortBy]).localeCompare(b[sortBy]);
    });
  }

  renderTable(filtered);
  document.getElementById("rowCount").innerText = "Rows: " + filtered.length;
}

function resetTable() {
  document.getElementById("filterInput").value = "";
  document.getElementById("sortSelect").value = "";
  renderTable(dataset);
  document.getElementById("rowCount").innerText = "Rows: " + dataset.length;
}

document.addEventListener("DOMContentLoaded", loadDataset);

</script>

</body>
</html>
