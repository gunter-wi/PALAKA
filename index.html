<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JAVIER</title>

<style>
body {
  font-family: Arial;
  background: #0d0f14;
  color: #d4daf0;
  margin: 0;
  padding: 20px;
}

h2 {
  color: #f0b429;
}

/* search + controls */
.controls {
  margin: 10px 0;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.controls input,
.controls select,
.controls button {
  padding: 8px;
  border: none;
  border-radius: 4px;
}

/* scroll container */
.table-container {
  max-height: 500px;
  overflow: auto;
  border: 1px solid #2a2f45;
  margin-top: 10px;
}

/* table */
table {
  width: 100%;
  border-collapse: collapse;
}

/* sticky header */
thead th {
  position: sticky;
  top: 0;
  background: #1c1f2b;
  color: #f0b429;
  z-index: 2;
  padding: 10px;
  border: 1px solid #2a2f45;
}

td {
  padding: 8px;
  border: 1px solid #2a2f45;
}

tr:hover {
  background: #1c1f2b;
}
</style>

</head>

<body>

<h2>Dataset Dashboard</h2>

<p id="rowCount">Loading...</p>

<!-- CONTROLS -->
<div class="controls">
  <input id="searchInput" type="text" placeholder="Search Job Title or Author">

  <select id="sortSelect">
    <option value="">Sort by...</option>
    <option value="job_title">Job Title</option>
    <option value="experience_years">Experience</option>
    <option value="skills_count">Skills</option>
    <option value="salary">Salary</option>
  </select>

  <button onclick="applyFilterSort()">Apply</button>
  <button onclick="resetTable()">Reset</button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Job Title</th>
      <th>Experience</th>
      <th>Education</th>
      <th>Skills</th>
      <th>Industry</th>
      <th>Company Size</th>
      <th>Location</th>
      <th>Remote</th>
      <th>Salary</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>

<script>
"use strict";

/* =========================
   GLOBAL STATE
========================= */
window.DS = [];
let ORIGINAL_DATA = [];

/* =========================
   LOAD CSV
========================= */
async function loadCSV() {
  try {
    const res = await fetch("./dataset.csv");
    const text = await res.text();

    window.DS = parseCSV(text).slice(0, 5000);
    ORIGINAL_DATA = [...window.DS];

    renderTable(window.DS);
    updateCount(window.DS.length);

  } catch (err) {
    console.error(err);
    document.getElementById("rowCount").textContent =
      "❌ CSV failed. Check dataset.csv location or use Live Server.";
  }
}

/* =========================
   CSV PARSER
========================= */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(",").map(h => h.trim());

  const data = [];

  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(",");

    let obj = {};

    for (let j = 0; j < headers.length; j++) {
      let val = values[j];

      if (val !== "" && !isNaN(val)) val = Number(val);

      obj[headers[j]] = val;
    }

    data.push(obj);
  }

  return data;
}

/* =========================
   RENDER TABLE
========================= */
function renderTable(data) {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  if (!data.length) {
    body.innerHTML = `
      <tr>
        <td colspan="10" style="text-align:center;padding:20px;">
          No results found
        </td>
      </tr>`;
    return;
  }

  const fragment = document.createDocumentFragment();

  data.forEach((row, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${row.job_title || ""}</td>
      <td>${row.experience_years || ""}</td>
      <td>${row.education_level || ""}</td>
      <td>${row.skills_count || ""}</td>
      <td>${row.industry || ""}</td>
      <td>${row.company_size || ""}</td>
      <td>${row.location || ""}</td>
      <td>${row.remote_work || ""}</td>
      <td>${row.salary || ""}</td>
    `;

    fragment.appendChild(tr);
  });

  body.appendChild(fragment);
}

/* =========================
   SEARCH + SORT
========================= */
function applyFilterSort() {
  let data = [...ORIGINAL_DATA];

  const search = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const sort = document.getElementById("sortSelect").value;

  /* FILTER */
  if (search) {
    data = data.filter(row =>
      (row.job_title && row.job_title.toLowerCase().includes(search)) ||
      (row.author && row.author.toLowerCase().includes(search))
    );
  }

  /* SORT */
  if (sort) {
    data.sort((a, b) => {
      if (typeof a[sort] === "number") {
        return b[sort] - a[sort];
      }
      return (a[sort] || "").localeCompare(b[sort] || "");
    });
  }

  window.DS = data;

  renderTable(data);
  updateCount(data.length);
}

/* =========================
   RESET
========================= */
function resetTable() {
  document.getElementById("searchInput").value = "";
  document.getElementById("sortSelect").value = "";

  window.DS = [...ORIGINAL_DATA];

  renderTable(window.DS);
  updateCount(window.DS.length);
}

/* =========================
   COUNT
========================= */
function updateCount(n) {
  document.getElementById("rowCount").textContent =
    `${n} rows loaded (max 5000)`;
}

/* =========================
   INIT
========================= */
loadCSV();
</script>

</body>
</html>
