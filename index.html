<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JAVIER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0d0f14;
  color: #d4daf0;
  margin: 0;
  padding: 20px;
}

h2 {
  color: #f0b429;
}

/* search + controls */
.controls {
  margin: 10px 0;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.controls input,
.controls select,

  padding: 8px;

/* scroll container */

  max-height: 500px;
  overflow: auto;
  border: 1px solid #2a2f45;
  margin-top: 10px;
}

/* table */
table {
  width: 100%;
  border-collapse: collapse;
}

/* sticky header */
thead th {
  position: sticky;
  top: 0;
  background: #1c1f2b;
  color: #f0b429;
  z-index: 2;
  padding: 10px;
  border: 1px solid #2a2f45;

  padding: 8px;

}

tr:hover {

  border-top: 2px solid #facc15;
  padding-top: 20px;
}

.viz-section h2 {
  color: #facc15;
  margin-bottom: 20px;
}

.viz-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.viz-card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 18px;
  padding: 20px;
  min-height: 350px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.viz-card h3 {
  margin-bottom: 20px;
  font-size: 18px;
  color: white;
  font-weight: bold;
}

.viz-card canvas {
  width: 100% !important;
  height: 260px !important;
}

/* Tab navigation */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab-btn {
  padding: 10px 20px;
  background: #1c1f2b;
  border: 1px solid #2a2f45;
  color: #d4daf0;
  border-radius: 4px;
  cursor: pointer;
}

.tab-btn.active {
  background: #f0b429;
  color: #0d0f14;
  font-weight: bold;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}
</style>

</head>

<body>

<h2>Dataset Dashboard</h2>

<!-- Tab Navigation -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('table')">Data Table</button>
  <button class="tab-btn" onclick="showTab('visualization')">Visualizations</button>
</div>

<!-- Table View -->
<div id="tableView" class="tab-content active">

<!-- CONTROLS -->
<div class="controls">
  <input id="searchInput" type="text" placeholder="Search Job Title or Author">

  <select id="sortSelect">
    <option value="">Sort by...</option>
    <option value="job_title">Job Title</option>
    <option value="experience_years">Experience</option>
    <option value="skills_count">Skills</option>
    <option value="salary">Salary</option>
  </select>

  <!-- New: sort order selector -->
  <select id="sortOrder" title="Sort order">
    <option value="desc">High → Low</option>
    <option value="asc">Low → High</option>
  </select>

  <button onclick="applyFilterSort()">Apply</button>
  <button onclick="resetTable()">Reset</button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Job Title</th>
      <th>Experience</th>
      <th>Education</th>
      <th>Skills</th>
      <th>Industry</th>
      <th>Company Size</th>
      <th>Location</th>
      <th>Remote</th>
      <th>Salary</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>
</div>

<!-- Visualization View -->
<div id="vizView" class="tab-content">
<div class="viz-grid">
  <div class="viz-card">
    <h3>JOB TITLE VS SALARY</h3>
    <canvas id="barChart"></canvas>
  </div>

  <div class="viz-card">
    <h3>EXPERIENCE YEARS VS SALARY</h3>
    <canvas id="scatterChart"></canvas>
  </div>

  <div class="viz-card">
    <h3>SALARY DISTRIBUTION</h3>
    <canvas id="histogramChart"></canvas>
  </div>

  <div class="viz-card">
    <h3>INDUSTRY DISTRIBUTION</h3>
    <canvas id="pieChart"></canvas>
  </div>
</div>
</div>

<script>
"use strict";

/* =========================
   GLOBAL STATE
========================= */
window.DS = [];
let ORIGINAL_DATA = [];
let chartInstances = {};

/* =========================
   TAB NAVIGATION
========================= */
function showTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  
  if (tabName === 'table') {
    document.getElementById('tableView').classList.add('active');
    document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
  } else {
    document.getElementById('vizView').classList.add('active');
    document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
    // Initialize charts when switching to visualization tab
    if (window.DS.length > 0) {
      initCharts();
    }
  }
}

/* =========================
   LOAD CSV (robust) + STATS
========================= */

// Inject small stats/file-picker UI into the page (keeps HTML tidy when not needed)
(function insertStatsPanel() {
  const tableView = document.getElementById('tableView');
  if (!tableView) return;
  const container = document.createElement('div');
  container.id = 'statsControlsAndPanel';
  container.innerHTML = `
    <div id="statsControls" style="margin:12px 0; display:none;">
      <label style="font-family:Arial;color:#d4daf0;font-size:0.92rem;">If fetch fails, choose dataset.csv:</label>
      <input id="statsFileInput" type="file" accept=".csv" style="margin-left:8px;" />
      <div id="statsMessage" style="color:#e05c6a;font-family:Arial;margin-top:6px;"></div>
    </div>

    <div id="statsPanel" style="margin-top:20px; display:block;">
      <h3 style="color:#f0b429; margin:8px 0;">Statistical Summary</h3>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
        <div style="background:#111827;padding:12px;border-radius:8px;min-width:120px;">
          <div style="font-size:0.8rem;color:#6b748f">Mean Salary</div>
          <div id="statMean" style="font-weight:700;color:#e05c6a">—</div>
        </div>
        <div style="background:#111827;padding:12px;border-radius:8px;min-width:120px;">
          <div style="font-size:0.8rem;color:#6b748f">Median Salary</div>
          <div id="statMedian" style="font-weight:700;color:#e05c6a">—</div>
        </div>
        <div style="background:#111827;padding:12px;border-radius:8px;min-width:120px;">
          <div style="font-size:0.8rem;color:#6b748f">Std Dev</div>
          <div id="statStdDev" style="font-weight:700;color:#e05c6a">—</div>
        </div>
        <div style="background:#111827;padding:12px;border-radius:8px;min-width:120px;">
          <div style="font-size:0.8rem;color:#6b748f">Mode</div>
          <div id="statMode" style="font-weight:700;color:#e05c6a">—</div>
        </div>
      </div>

      <div style="display:flex;gap:20px;flex-wrap:wrap;">
        <div style="background:#111827;padding:12px;border-radius:8px;min-width:260px;">
          <div style="font-size:0.85rem;color:#6b748f">Descriptive</div>
          <ul style="list-style:none;padding:0;margin:8px 0 0 0;font-family:Arial;font-size:0.9rem;color:#3ecfcf">
            <li>Count: <span id="dCount">—</span></li>
            <li>Min: <span id="dMin">—</span></li>
            <li>Max: <span id="dMax">—</span></li>
            <li>Range: <span id="dRange">—</span></li>
            <li>Variance: <span id="dVariance">—</span></li>
            <li>Std Dev: <span id="dStdDev">—</span></li>
          </ul>
        </div>

        <div style="background:#111827;padding:12px;border-radius:8px;min-width:260px;">
          <div style="font-size:0.85rem;color:#6b748f">Correlation (Experience → Salary)</div>
          <ul style="list-style:none;padding:0;margin:8px 0 0 0;font-family:Arial;font-size:0.9rem;color:#3ecfcf">
            <li>Pearson r: <span id="rPearson">—</span></li>
            <li>Interpretation: <span id="rInterp">—</span></li>
            <li>Slope: <span id="rSlope">—</span></li>
            <li>Intercept: <span id="rIntercept">—</span></li>
            <li>R²: <span id="rSquared">—</span></li>

          </ul>

      </div>
    </div>
  `;
  tableView.parentNode.insertBefore(container, tableView.nextSibling);
})();

// Quote-aware CSV parser (handles quoted fields and escaped quotes)
function parseCSVText(text) {
  if (!text) return [];
  const normalized = String(text).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = normalized.split('\n').filter(l => l.trim() !== '');

  function parseLine(line) {
    const out = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
        else { inQuotes = !inQuotes; }
      } else if (ch === ',' && !inQuotes) {
        out.push(cur);
        cur = '';
      } else {
        cur += ch;
      }
    }
    out.push(cur);
    return out.map(s => s.trim());
  }

  const headers = parseLine(lines[0]).map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseLine(lines[i]);
    if (vals.length === 0) continue;
    const obj = {};
    for (let j = 0; j < headers.length; j++) {
      let key = headers[j];
      let val = vals[j] !== undefined ? vals[j] : '';
      // convert numeric-looking salary/experience fields
      if (key && (key.toLowerCase().includes('salary') || key.toLowerCase().includes('experience'))) {
        const num = Number(String(val).replace(/[^0-9.+-eE]/g, ''));
        val = isNaN(num) ? val : num;
      }
      obj[key] = val;
    }
    rows.push(obj);
  }
  return rows;
}

// Unified loader: fetch when possible, otherwise show file picker
async function loadCSV() {
  const controls = document.getElementById('statsControls');
  const msg = document.getElementById('statsMessage');
  try {
    if (location.protocol === 'file:') {
      if (controls) controls.style.display = 'block';
      if (msg) msg.textContent = 'Page opened via file:// — please select dataset.csv.';
      return;
    }

    const res = await fetch('./dataset.csv');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();

    // use robust parser
    const rows = parseCSVText(text);
    window.DS = rows.slice(0, 5000);
    ORIGINAL_DATA = [...window.DS];

    renderTable(window.DS);

    // show stats panel and render statistics + charts
    const sp = document.getElementById('statsPanel'); if (sp) sp.style.display = 'block';
    renderStats(window.DS);
    if (window.DS.length > 0) initCharts();

  } catch (err) {
    console.error('Error loading dataset:', err);
    if (controls) controls.style.display = 'block';
    if (msg) msg.textContent = 'Could not fetch dataset.csv — choose file or run a local server. (' + err.message + ')';
  }
}

// File input handler (fallback)
(function attachFileInput() {
  document.addEventListener('change', (e) => {
    const t = e.target;
    if (!t || t.id !== 'statsFileInput') return;
    const f = t.files && t.files[0];
    const msg = document.getElementById('statsMessage');
    if (!f) return;
    if (msg) msg.textContent = 'Reading ' + f.name + '...';
    const r = new FileReader();
    r.onload = () => {
      try {
        const rows = parseCSVText(String(r.result));
        if (!rows || rows.length === 0) {
          if (msg) msg.textContent = 'File parsed but contains no rows.';
          return;
        }
        window.DS = rows.slice(0, 5000);
        ORIGINAL_DATA = [...window.DS];
        renderTable(window.DS);
        const sp = document.getElementById('statsPanel'); if (sp) sp.style.display = 'block';
        renderStats(window.DS);
        if (window.DS.length > 0) initCharts();
        if (msg) msg.textContent = 'Loaded ' + f.name + '.';
      } catch (err) {
        console.error('Error parsing file:', err);
        if (msg) msg.textContent = 'Error parsing CSV: ' + err.message;
      }
    };
    r.onerror = () => { if (msg) msg.textContent = 'Error reading file.'; };
    r.readAsText(f);
  });
})();

// Statistical helpers (mean, median, mode, variance, stdDev, pearson, regression)
function mean(arr) { if (!arr || arr.length === 0) return 0; const sum = arr.reduce((a,b) => a + b, 0); return sum / arr.length; }
function median(arr) { if (!arr || arr.length===0) return 0; const s=[...arr].sort((a,b)=>a-b); const n=s.length; return n%2? s[(n-1)/2] : (s[n/2-1]+s[n/2])/2; }
function mode(arr) { if (!arr||arr.length===0) return 'N/A'; const f={}; let m=0; arr.forEach(v=>{f[v]=(f[v]||0)+1; m=Math.max(m,f[v]);}); if (m<=1) return 'No mode'; return Object.keys(f).filter(k=>f[k]===m).map(Number).sort((a,b)=>a-b).join(' & '); }
function variance(arr){ if(!arr||arr.length===0) return 0; const mu=mean(arr); return arr.reduce((acc,v)=>acc+Math.pow(v-mu,2),0)/arr.length; }
function stdDev(arr){return Math.sqrt(variance(arr));}
function pearsonCorr(x,y){ if(!x||!y||x.length!==y.length||x.length===0) return 0; const n=x.length; const mx=mean(x), my=mean(y); let num=0,sx=0,sy=0; for(let i=0;i<n;i++){const dx=x[i]-mx, dy=y[i]-my; num+=dx*dy; sx+=dx*dx; sy+=dy*dy;} const den=Math.sqrt(sx*sy); return den===0?0:num/den; }
function linearRegression(x,y){ if(!x||!y||x.length!==y.length||x.length===0) return {slope:0,intercept:0,rSquared:0}; const mx=mean(x), my=mean(y); let num=0,den=0; for(let i=0;i<x.length;i++){ num+=(x[i]-mx)*(y[i]-my); den+=(x[i]-mx)*(x[i]-mx);} const slope = den===0?0:num/den; const intercept = my - slope*mx; const r = pearsonCorr(x,y); return {slope, intercept, rSquared: r*r}; }
function getMin(arr){ return arr.reduce((m,v)=> v<m? v:m, arr[0]); }
function getMax(arr){ return arr.reduce((M,v)=> v>M? v:M, arr[0]); }

function renderStats(data){
  try{
    const salaries = data.map(d => Number(d.salary)).filter(v=>!isNaN(v));
    const experience = data.map(d => Number(d.experience_years)).filter(v=>!isNaN(v));
    const mVal = mean(salaries); const med=median(salaries); const sd=stdDev(salaries); const mo=mode(salaries);
    const minV = getMin(salaries); const maxV = getMax(salaries); const varV = variance(salaries);

    const fmt = (v) => isNaN(v)? '—' : '$' + v.toLocaleString(undefined,{maximumFractionDigits:2});
    const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };

    set('statMean', fmt(mVal)); set('statMedian', fmt(med)); set('statStdDev', fmt(sd)); set('statMode', mo !== 'No mode' ? ('$'+mo) : 'N/A');
    set('dCount', (salaries.length).toLocaleString()); set('dMin', fmt(minV)); set('dMax', fmt(maxV)); set('dRange', fmt(maxV - minV)); set('dVariance', varV.toLocaleString(undefined,{maximumFractionDigits:2})); set('dStdDev', sd.toLocaleString(undefined,{maximumFractionDigits:2}));

    const r = pearsonCorr(experience, salaries); const reg = linearRegression(experience, salaries);
    set('rPearson', r.toFixed(4));
    let interp = ''; const absR = Math.abs(r); if (absR>=0.7) interp+='Strong '; else if (absR>=0.4) interp+='Moderate '; else interp+='Weak '; interp += r>=0? 'Positive':'Negative'; set('rInterp', interp);
    set('rSlope', reg.slope.toFixed(4)); set('rIntercept', reg.intercept.toFixed(4)); set('rSquared', reg.rSquared.toFixed(4)); set('rEquation', 'salary = ' + reg.slope.toFixed(2) + '·experience + ' + reg.intercept.toFixed(2));

  } catch(e){ console.error('Error rendering stats', e); }
}

/* =========================
   LOAD CSV
========================= */
async function loadCSV() {
  try {
    const res = await fetch("./dataset.csv");
    const text = await res.text();

    // use robust parser
    const rows = parseCSVText(text);
    window.DS = rows.slice(0, 5000);
    ORIGINAL_DATA = [...window.DS];

    renderTable(window.DS);

    // show stats panel and render statistics + charts
    const sp = document.getElementById('statsPanel'); if (sp) sp.style.display = 'block';
    renderStats(window.DS);
    if (window.DS.length > 0) initCharts();

  } catch (err) {
    console.error(err);
    const controls = document.getElementById('statsControls');
    const msg = document.getElementById('statsMessage');
    if (controls) controls.style.display = 'block';
    if (msg) msg.textContent = 'Could not fetch dataset.csv — choose file or run a local server. (' + err.message + ')';
  }
}

/* =========================
   CSV PARSER
========================= */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(",").map(h => h.trim());

  const data = [];

  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(",");

    let obj = {};

    for (let j = 0; j < headers.length; j++) {
      let val = values[j];

      if (val !== "" && !isNaN(val)) val = Number(val);

      obj[headers[j]] = val;
    }

    data.push(obj);
  }

  return data;
}

/* =========================
   RENDER TABLE
========================= */
function renderTable(data) {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  if (!data.length) {
    body.innerHTML = `
      <tr>
        <td colspan="10" style="text-align:center;padding:20px;">
          No results found
        </td>
      </tr>`;
    return;
  }

  const fragment = document.createDocumentFragment();

  data.forEach((row, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${row.job_title || ""}</td>
      <td>${row.experience_years || ""}</td>
      <td>${row.education_level || ""}</td>
      <td>${row.skills_count || ""}</td>
      <td>${row.industry || ""}</td>
      <td>${row.company_size || ""}</td>
      <td>${row.location || ""}</td>
      <td>${row.remote_work || ""}</td>
      <td>${row.salary || ""}</td>
    `;

    fragment.appendChild(tr);
  });

  body.appendChild(fragment);
}

/* =========================
   SEARCH + SORT
========================= */
function applyFilterSort() {
  let data = [...ORIGINAL_DATA];

  const search = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const sort = document.getElementById("sortSelect").value;
  const order = document.getElementById("sortOrder").value || 'desc';

  /* FILTER */
  if (search) {
    data = data.filter(row =>
      (row.job_title && row.job_title.toLowerCase().includes(search)) ||
      (row.author && row.author.toLowerCase().includes(search))
    );
  }

  /* SORT */
  if (sort) {
    data.sort((a, b) => {
      const av = a[sort];
      const bv = b[sort];

      // numeric comparison when possible
      if ((typeof av === 'number' || !isNaN(av)) && (typeof bv === 'number' || !isNaN(bv))) {
        const na = Number(av) || 0;
        const nb = Number(bv) || 0;
        return order === 'desc' ? (nb - na) : (na - nb);
      }

      // string comparison fallback
      const sa = (av || "") + "";
      const sb = (bv || "") + "";
      return order === 'desc' ? sb.localeCompare(sa) : sa.localeCompare(sb);
    });
  }

  window.DS = data;

  renderTable(data);
}

/* =========================
   RESET
========================= */
function resetTable() {
  document.getElementById("searchInput").value = "";
  document.getElementById("sortSelect").value = "";
  // reset sort order to default (High → Low)
  const so = document.getElementById("sortOrder");
  if (so) so.value = 'desc';

  window.DS = [...ORIGINAL_DATA];

  renderTable(window.DS);
}

/* =========================
   CHART HELPERS
========================= */
function destroyChart(canvasId) {
  if (chartInstances[canvasId]) {
    chartInstances[canvasId].destroy();
  }
}

// 1. BAR CHART — Job Title vs Salary
function drawBarChart(canvasId, data) {
  destroyChart(canvasId);

  const ctx = document.getElementById(canvasId);

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(row => row.job_title),
      datasets: [{
        label: 'Salary',
        data: data.map(row => row.salary),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      plugins: {
        title: {
          display: true,
          text: 'Job Title vs Salary'
        }
      },
      scales: {
        x: {
          title: {
            display: true,
            text: 'Job Title'
          }
        },
        y: {
          beginAtZero: true,
          title: {
            display: true,
            text: 'Salary'
          }
        }
      }
    }
  });
}

// 2. SCATTER PLOT — Experience vs Salary
function drawScatterPlot(canvasId, data) {
  destroyChart(canvasId);

  const ctx = document.getElementById(canvasId);

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'Experience vs Salary',
        data: data.map(row => ({
          x: row.experience_years,
          y: row.salary
        })),
        pointRadius: 7
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: {
          title: {
            display: true,
            text: 'Experience Years'
          }
        },
        y: {
          title: {
            display: true,
            text: 'Salary'
          }
        }
      }
    }
  });
}

// 3. HISTOGRAM — Salary Distribution
function drawHistogram(canvasId, data) {
  destroyChart(canvasId);

  const ctx = document.getElementById(canvasId);

  const bins = {
    "50k-80k": 0,
    "80k-110k": 0,
    "110k-140k": 0,
    "140k-170k": 0,
    "170k-200k": 0,
    "200k+": 0
  };

  data.forEach(row => {
    const salary = row.salary;

    if (salary < 80000) bins["50k-80k"]++;
    else if (salary < 110000) bins["80k-110k"]++;
    else if (salary < 140000) bins["110k-140k"]++;
    else if (salary < 170000) bins["140k-170k"]++;
    else if (salary < 200000) bins["170k-200k"]++;
    else bins["200k+"]++;
  });

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(bins),
      datasets: [{
        label: 'Frequency',
        data: Object.values(bins),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true
    }
  });
}

// 4. PIE CHART — Industry Distribution
function drawPieChart(canvasId, data) {
  destroyChart(canvasId);

  const ctx = document.getElementById(canvasId);

  const industries = {};
  data.forEach(row => {
    industries[row.industry] = (industries[row.industry] || 0) + 1;
  });

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: Object.keys(industries),
      datasets: [{
        data: Object.values(industries),
        backgroundColor: [
          '#36A2EB',
          '#FF6384',
          '#FF9F40',
          '#FFCD56',
          '#4BC0C0',
          '#9966FF',
          '#C9C9C9',
          '#FF6384'
        ]
      }]
    },
    options: {
      responsive: true
    }
  });
}

// Initialize all charts
function initCharts() {
  if (window.DS.length > 0) {
    drawBarChart('barChart', window.DS);
    drawScatterPlot('scatterChart', window.DS);
    drawHistogram('histogramChart', window.DS);
    drawPieChart('pieChart', window.DS);
  }
}

========================= */
loadCSV();
</script>
