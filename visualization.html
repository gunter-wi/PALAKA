<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DATASCI COLLAB DASHBOARD</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0b1020;
      color:white;
      padding:20px;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    .header{
      margin-bottom:20px;
      border-bottom:2px solid #facc15;
      padding-bottom:10px;
    }

    .header h1{
      color:#facc15;
      font-size:32px;
      font-weight:bold;
    }

    .header p{
      color:#94a3b8;
      margin-top:5px;
    }

    .task-box{
      border:1px solid #22d3ee;
      border-radius:12px;
      padding:15px;
      margin-bottom:20px;
      color:#67e8f9;
      background:#0f172a;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:18px;
      padding:20px;
      min-height:350px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .card h3{
      margin-bottom:20px;
      font-size:18px;
      color:white;
      font-weight:bold;
    }

    canvas{
      width:100% !important;
      height:260px !important;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>DATASCI COLLAB DASHBOARD</h1>
    <p>Student Performance Dataset • Git Collaborative Activity</p>
  </div>

  <div class="task-box">
    Student 2 Contribution — Data Visualization Layer
  </div>

  <div class="grid">
    <div class="card">
      <h3>STUDY HOURS VS FINAL SCORE</h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="card">
      <h3>ATTENDANCE % VS FINAL SCORE</h3>
      <canvas id="scatterChart"></canvas>
    </div>

    <div class="card">
      <h3>FINAL SCORE DISTRIBUTION</h3>
      <canvas id="histogramChart"></canvas>
    </div>

    <div class="card">
      <h3>GRADE DISTRIBUTION</h3>
      <canvas id="pieChart"></canvas>
    </div>
  </div>

</div>

<script>
  // sample data
  window.DS = [
    {name:"Ana", studyHours:2, attendance:85, score:78, grade:"C"},
    {name:"Ben", studyHours:4, attendance:90, score:88, grade:"B"},
    {name:"Carl", studyHours:6, attendance:95, score:94, grade:"A"},
    {name:"Dina", studyHours:3, attendance:80, score:72, grade:"C"},
    {name:"Ella", studyHours:5, attendance:98, score:96, grade:"A"}
  ];

  function destroyChart(id){
    const oldChart = Chart.getChart(id);
    if(oldChart){
      oldChart.destroy();
    }
  }

  function drawBarChart(canvasId, data){
    destroyChart(canvasId);

    new Chart(document.getElementById(canvasId), {
      type:'bar',
      data:{
        labels:data.map(x => x.studyHours),
        datasets:[{
          label:'Final Score',
          data:data.map(x => x.score),
          backgroundColor:'rgba(54,162,235,0.7)'
        }]
      },
      options:{
        plugins:{
          legend:{ labels:{ color:'white' } }
        },
        scales:{
          x:{
            ticks:{ color:'white' },
            title:{
              display:true,
              text:'Study Hours',
              color:'white'
            }
          },
          y:{
            beginAtZero:true,
            max:100,
            ticks:{ color:'white' },
            title:{
              display:true,
              text:'Final Score',
              color:'white'
            }
          }
        }
      }
    });
  }

  function drawScatterPlot(canvasId, data){
    destroyChart(canvasId);

    new Chart(document.getElementById(canvasId), {
      type:'scatter',
      data:{
        datasets:[{
          label:'Attendance vs Score',
          data:data.map(x => ({
            x:x.attendance,
            y:x.score
          })),
          backgroundColor:'rgba(54,162,235,0.8)',
          pointRadius:6
        }]
      },
      options:{
        plugins:{
          legend:{ labels:{ color:'white' } }
        },
        scales:{
          x:{
            ticks:{ color:'white' },
            title:{
              display:true,
              text:'Attendance %',
              color:'white'
            }
          },
          y:{
            ticks:{ color:'white' },
            title:{
              display:true,
              text:'Final Score',
              color:'white'
            }
          }
        }
      }
    });
  }

  function drawHistogram(canvasId, data){
    destroyChart(canvasId);

    let bins = {
      "60-69":0,
      "70-79":0,
      "80-89":0,
      "90-100":0
    };

    data.forEach(x=>{
      let s = x.score;
      if(s < 70) bins["60-69"]++;
      else if(s < 80) bins["70-79"]++;
      else if(s < 90) bins["80-89"]++;
      else bins["90-100"]++;
    });

    new Chart(document.getElementById(canvasId), {
      type:'bar',
      data:{
        labels:Object.keys(bins),
        datasets:[{
          label:'Frequency',
          data:Object.values(bins),
          backgroundColor:'rgba(54,162,235,0.7)'
        }]
      },
      options:{
        plugins:{
          legend:{ labels:{ color:'white' } }
        },
        scales:{
          x:{ ticks:{ color:'white' } },
          y:{ ticks:{ color:'white' } }
        }
      }
    });
  }

  function drawPieChart(canvasId, data){
    destroyChart(canvasId);

    let grades = {A:0,B:0,C:0,D:0};

    data.forEach(x=>{
      grades[x.grade]++;
    });

    new Chart(document.getElementById(canvasId), {
      type:'pie',
      data:{
        labels:Object.keys(grades),
        datasets:[{
          data:Object.values(grades),
          backgroundColor:[
            '#36A2EB',
            '#FF6384',
            '#FF9F40',
            '#FFCD56'
          ]
        }]
      },
      options:{
        plugins:{
          legend:{
            labels:{ color:'white' }
          }
        }
      }
    });
  }

  function initCharts(){
    const data = window.DS;

    drawBarChart("barChart", data);
    drawScatterPlot("scatterChart", data);
    drawHistogram("histogramChart", data);
    drawPieChart("pieChart", data);
  }

  initCharts();
</script>

</body>
</html>
