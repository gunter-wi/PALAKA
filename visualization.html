<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DATASCI COLLAB DASHBOARD</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="visualization.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0b1020;
      color:white;
      padding:20px;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    .header{
      margin-bottom:20px;
      border-bottom:2px solid #facc15;
      padding-bottom:10px;
    }

    .header h1{
      color:#facc15;
      font-size:32px;
      font-weight:bold;
    }

    .header p{
      color:#94a3b8;
      margin-top:5px;
    }

    .task-box{
      border:1px solid #22d3ee;
      border-radius:12px;
      padding:15px;
      margin-bottom:20px;
      color:#67e8f9;
      background:#0f172a;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:18px;
      padding:20px;
      min-height:350px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .card h3{
      margin-bottom:20px;
      font-size:18px;
      color:white;
      font-weight:bold;
    }

    canvas{
      width:100% !important;
      height:260px !important;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>DATASCI COLLAB DASHBOARD</h1>
    <p>Job Salary Dataset • Git Collaborative Activity</p>
  </div>

  <div class="task-box">
    Student 2 Contribution — Data Visualization Layer (CSV Linked)
  </div>

  <div class="grid">
    <div class="card">
      <h3>JOB TITLE VS SALARY</h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="card">
      <h3>EXPERIENCE YEARS VS SALARY</h3>
      <canvas id="scatterChart"></canvas>
    </div>

    <div class="card">
      <h3>SALARY DISTRIBUTION</h3>
      <canvas id="histogramChart"></canvas>
    </div>

    <div class="card">
      <h3>INDUSTRY DISTRIBUTION</h3>
      <canvas id="pieChart"></canvas>
    </div>
  </div>

</div>

<script>
  // Initialize charts when Chart.js is ready
  function init() {
    if (typeof Chart !== 'undefined') {
      initCharts();
    } else {
      // Wait for Chart.js to load
      setTimeout(init, 100);
    }
  }
  init();
</script>

</body>
</html>
