<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DATASCI COLLAB DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  padding: 20px;
  background: #0d0f14;
  color: #d4daf0;
  font-family: Arial;
}
h2 { color: #f0b429; }

.section {
  margin-bottom: 40px;
}

table {
  width: 100%;
  border-collapse: collapse;
}
td, th {
  border: 1px solid #2a2f45;
  padding: 6px;
}
canvas{
  max-width:100%;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>DATASCI COLLAB DASHBOARD</h1>

<!-- ================= JAVIER ================= -->
<div class="section">
<h2>JAVIER — TABLE</h2>

<input type="text" id="filterInput" placeholder="Filter by job title..." />
<select id="sortSelect">
  <option value="">Sort by...</option>
  <option value="job_title">Job Title</option>
  <option value="experience_years">Experience</option>
  <option value="salary">Salary</option>
</select>

<button onclick="applyFilterSort()">Apply</button>
<button onclick="resetTable()">Reset</button>

<p id="rowCount"></p>

<table>
<thead>
<tr>
<th>#</th>
<th>Job Title</th>
<th>Experience</th>
<th>Salary</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- ================= ALANSALON ================= -->
<div class="section">
<h2>ALANSALON — CHARTS</h2>

<canvas id="barChart"></canvas>
<canvas id="scatterChart"></canvas>
<canvas id="pieChart"></canvas>
</div>

<!-- ================= GUARDO ================= -->
<div class="section">
<h2>GUARDO — STATISTICS</h2>

<p>Mean Salary: <span id="mean"></span></p>
<p>Median Salary: <span id="median"></span></p>
<p>Std Dev: <span id="std"></span></p>
</div>

<script>
"use strict";

/* ===============================
   JAVIER CSV (UNCHANGED)
================================ */
const RAW_DATA = `job_title,experience_years,education_level,skills_count,industry,company_size,location,remote_work,certifications,salary
AI Engineer,10,Bachelor,2,Healthcare,Medium,India,Hybrid,2,109413
Data Analyst,5,Bachelor,17,Telecom,Small,Australia,No,0,93764
Frontend Developer,18,PhD,4,Media,Medium,Singapore,No,1,148123
Business Analyst,19,PhD,13,Retail,Medium,Canada,Yes,0,189123
Product Manager,15,Bachelor,7,Manufacturing,Large,Sweden,Yes,0,165069
AI Engineer,0,High School,4,Education,Enterprise,USA,No,2,180351
Backend Developer,6,High School,16,Manufacturing,Enterprise,Canada,No,3,165375
Machine Learning Engineer,4,Bachelor,18,Healthcare,Enterprise,Canada,Hybrid,5,202463
AI Engineer,5,Diploma,14,Telecom,Enterprise,Singapore,Yes,0,171834
Frontend Developer,18,PhD,2,Retail,Enterprise,India,Hybrid,5,128377`;

window.DS = [];

/* ===============================
   JAVIER FUNCTIONS
================================ */
function loadDataset() {
  const lines = RAW_DATA.trim().split("\n");
  const headers = lines[0].split(",");

  window.DS = lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};

    headers.forEach((h, i) => {
      let val = values[i];
      if (!isNaN(val)) val = Number(val);
      obj[h] = val;
    });

    return obj;
  });

  renderTable(window.DS);
  updateCount(window.DS.length);

  initCharts();
  renderStats();
}

function renderTable(data) {
  const tableBody = document.getElementById("tableBody");
  tableBody.innerHTML = "";

  data.forEach((row, index) => {
    tableBody.innerHTML += `
      <tr>
        <td>${index+1}</td>
        <td>${row.job_title}</td>
        <td>${row.experience_years}</td>
        <td>${row.salary}</td>
      </tr>`;
  });
}

function applyFilterSort() {
  const filter = document.getElementById("filterInput").value.toLowerCase();
  const sortKey = document.getElementById("sortSelect").value;

  let filtered = window.DS.filter(d =>
    d.job_title.toLowerCase().includes(filter)
  );

  if (sortKey) {
    filtered.sort((a, b) => {
      if (sortKey === "job_title") {
        return a.job_title.localeCompare(b.job_title);
      } else {
        return (b[sortKey] || 0) - (a[sortKey] || 0);
      }
    });
  }

  renderTable(filtered);
  updateCount(filtered.length);
}

function resetTable() {
  document.getElementById("filterInput").value = "";
  document.getElementById("sortSelect").value = "";

  renderTable(window.DS);
  updateCount(window.DS.length);
}

function updateCount(count) {
  document.getElementById("rowCount").textContent = count + " rows";
}

/* ===============================
   ALANSALON (CONNECTED TO CSV)
================================ */
function initCharts(){
  const data = window.DS;

  new Chart(barChart,{
    type:'bar',
    data:{
      labels:data.map(x=>x.job_title),
      datasets:[{
        label:'Salary',
        data:data.map(x=>x.salary)
      }]
    }
  });

  new Chart(scatterChart,{
    type:'scatter',
    data:{
      datasets:[{
        label:'Experience vs Salary',
        data:data.map(x=>({
          x:x.experience_years,
          y:x.salary
        }))
      }]
    }
  });

  new Chart(pieChart,{
    type:'pie',
    data:{
      labels:data.map(x=>x.job_title),
      datasets:[{
        data:data.map(x=>x.salary)
      }]
    }
  });
}

/* ===============================
   GUARDO (FIXED)
================================ */
function mean(arr){return arr.reduce((a,b)=>a+b,0)/arr.length;}

function median(arr){
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}

function variance(arr){
  const m=mean(arr);
  return mean(arr.map(x=>(x-m)**2));
}

function std(arr){
  return Math.sqrt(variance(arr));
}

function renderStats(){
  const salaries = window.DS.map(x=>x.salary);

  document.getElementById("mean").innerText = mean(salaries).toFixed(2);
  document.getElementById("median").innerText = median(salaries).toFixed(2);
  document.getElementById("std").innerText = std(salaries).toFixed(2);
}

/* ===============================
   INIT
================================ */
document.addEventListener("DOMContentLoaded", loadDataset);
</script>

</body>
</html>
